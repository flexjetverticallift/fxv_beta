<!DOCTYPE html>
<!--
================================================================================
  FXV WEIGHT & BALANCE — FEATURE CHECKLIST
  Verify ALL of the following are present before making any edits.
  If anything is missing, restore it from transcript history first.
================================================================================

  [FIREBASE]
  - Firebase SDK scripts (firebase-app-compat, firebase-firestore-compat) in <head>
  - firebase.initializeApp() with fxv-weight-and-balance config
  - const db = firebase.firestore()
  - loadFromFirebase() — reads pilots + aircraft from Firestore on startup
  - saveToFirebase() — POSTs to Cloud Function (NOT direct Firestore write)
  - FUNCTION_URL = https://us-central1-fxv-weight-and-balance.cloudfunctions.net/adminSave
  - loadFromFirebase() called at bottom of <script> on startup

  [ADMIN PANEL]
  - CSS: .admin-btn, .pw-overlay, .pw-box, .admin-panel, .admin-table, .ac-card etc.
  - HTML: <div id="pw-overlay"> password modal
  - HTML: <div id="admin-panel"> full-screen overlay with Personnel + Aircraft tabs
  - Button: "🔒 Update / Edit (Admin Only)" with class="admin-btn no-print"
  - JS: openPW(), closePW(), checkPW() — password is "kbdr" (case insensitive)
  - JS: openAdminPanel(), closeAdmin(), switchTab()
  - JS: renderAdminPersonnel(), renderAdminAircraft()
  - JS: adminUpdatePilot(), adminToggleRole(), adminDeletePilot(), adminAddPilot()
  - JS: adminUpdateAircraft(), adminDeleteAircraft(), adminAddAircraft()
  - JS: adminSave() — calls refreshLists() + render() + saveToFirebase()
  - JS: let adminActiveTab = "personnel"

  [PDF EXPORT]
  - drawWBToCanvas() — renders W&B sheet to 1632px-wide canvas (2x resolution)
  - canvasToPDF() — converts canvas to single-page PDF binary
  - exportPDF() — queue workflow, leg numbering, export/re-export logic
  - printThisSheet() — one-shot PDF via navigator.share() (no queue)
  - PDF queue panel + Export Leg N button + Send All to Ops button
  - "PDF this sheet" button (.print-sheet-btn)

  [PERFORMANCE]
  - calcPerf() — HOGE, MEA, V1 for C+, C++; Cat A envelope for D model
  - hogeTableCP, hogeTableCPP, hogeTableD — 2D bilinear interpolation tables
  - getHOGEWeight(pa, oat, model) — bilinear interp; returns NULL (Not Permitted) when oat exceeds
    max non-null temp in table at bounding altitudes. Uses .filter(t=>table[alt][t]!==null).
  - MEA_CP, MEA_CPP, MEA_D — 1D lookup by temp at 5000ft (t5 variable)
  - calcV1formula(pa, oat, gw, intercept, slope) — MUST use actual hp (pressure altitude), NOT 0
    C+:  intercept=10500.00, slope=0.333333
    C++: intercept=10883.76, slope=0.420135
    Called as: calcV1formula(hp, c, totalWeight, ...) — if hp or c is null, returns null
    V1 is altitude-sensitive: at GW=11000/OAT=20C, V1 goes 37kts(PA=0)→49kts(PA=3000)
  - catATableD — D model Cat A GW limit table (PA × OAT → max GW for 35kt V1)
  - getCatAWeight(pa, oat) — bilinear interp on catATableD; returns null if outside envelope
  - D model V1: getCatAWeight(hp,c) → if null→-1, if GW<=limit→35, else→-1
    Displayed: 35kts / 'Outside Env' / '--' (no perf data)

  [UI / UX]
  - Altimeter input: type="text" inputmode="decimal" with formatAltimeter() onblur
  - Passenger count: <select> dropdowns 0-9 for numPassFwd and numPassAft
  - Mobile responsive CSS @media (max-width:600px)
  - @media print — hides .no-print elements (admin btn, export buttons etc.)
  - CG envelope canvas graph with drawGraph()

  [SERVICE WORKER / PWA]
  - Service worker registration at bottom of <script>
  - sw.js must be deployed alongside index.html on GitHub Pages

================================================================================
-->

  const table = model.includes('S-76D') ? fuelArmD : fuelArmCP;
  
  // Find the two points to interpolate between
  for(let i=0; i<table.length-1; i++) {

  if(fuelWeight > table[table.length-1][0]) return table[table.length-1][1];

}

function checkInEnvelope(cg, weight, model, lateralCG) {

  // Check if weight is in range
  const minWE=Math.min(...env.map(p=>p[1]));
  const maxWE=Math.max(...env.map(p=>p[1]));
  if(weight<minWE||weight>maxWE)return false;
  
  // Point-in-polygon check
  let inside=false;
  for(let i=0,j=env.length-1;i<env.length;j=i++){
    const xi=env[i][0],yi=env[i][1];
    const xj=env[j][0],yj=env[j][1];
    const intersect=((yi>weight)!==(yj>weight))&&(cg<(xj-xi)*(weight-yi)/(yj-yi)+xi);
    if(intersect)inside=!inside;
  }
  return inside;
}

// 2D interpolation for HOGE weight
function getHOGEWeight(pressureAltitude, tempCelsius, model) {
  // Select correct table based on model
  let table;
  if (model.includes('S-76D')) {
    table = hogeTableD;
  } else if (model.includes('C++')) {
    table = hogeTableCPP;
  } else {
    // C+ models
    table = hogeTableCP;
  }
  
  // Get available altitudes (keys of table)
  const altitudes = Object.keys(table).map(Number).sort((a,b) => a-b);
  
  // Clamp pressure altitude to table range
  const alt = Math.max(altitudes[0], Math.min(altitudes[altitudes.length-1], pressureAltitude));
  
  // Find surrounding altitude points
  let altLower = altitudes[0];
  let altUpper = altitudes[altitudes.length-1];
  for (let i = 0; i < altitudes.length - 1; i++) {
    if (alt >= altitudes[i] && alt <= altitudes[i+1]) {
      altLower = altitudes[i];
      altUpper = altitudes[i+1];
      break;
    }
  }
  
  // Get temperature keys from both bounding altitudes, excluding null entries
  const tempsLower = Object.keys(table[altLower]).map(Number).sort((a,b) => a-b)
    .filter(t => table[altLower][t] !== null);
  const tempsUpper = Object.keys(table[altUpper]).map(Number).sort((a,b) => a-b)
    .filter(t => table[altUpper][t] !== null);

  // If temp exceeds the max permitted at either bounding altitude, return null ("Not Permitted")
  if (tempCelsius > tempsLower[tempsLower.length-1] || tempCelsius > tempsUpper[tempsUpper.length-1]) {
    return null;
  }

  // Use lower altitude's valid temp keys for interpolation
  const temps = tempsLower;

  // Clamp temperature to table minimum (cold end is always permitted)
  const temp = Math.max(temps[0], tempCelsius);
  
  // Find surrounding temperature points
  let tempLower = temps[0];
  let tempUpper = temps[temps.length-1];
  for (let i = 0; i < temps.length - 1; i++) {
    if (temp >= temps[i] && temp <= temps[i+1]) {
      tempLower = temps[i];
      tempUpper = temps[i+1];
      break;
    }
  }
  
  // Get the 4 corner values
  const w1 = table[altLower][tempLower];   // lower-left
  const w2 = table[altLower][tempUpper];   // lower-right
  const w3 = table[altUpper][tempLower];   // upper-left
  const w4 = table[altUpper][tempUpper];   // upper-right
  
  // Bilinear interpolation
  if (altUpper === altLower && tempUpper === tempLower) {
    return w1;
  } else if (altUpper === altLower) {
    // Interpolate only in temperature
    const t = (temp - tempLower) / (tempUpper - tempLower);
    return w1 + t * (w2 - w1);
  } else if (tempUpper === tempLower) {
    // Interpolate only in altitude
    const t = (alt - altLower) / (altUpper - altLower);
    return w1 + t * (w3 - w1);
  } else {
    // Full bilinear interpolation
    const tAlt = (alt - altLower) / (altUpper - altLower);
    const tTemp = (temp - tempLower) / (tempUpper - tempLower);
    const wLower = w1 + tTemp * (w2 - w1);
    const wUpper = w3 + tTemp * (w4 - w3);
    return wLower + tAlt * (wUpper - wLower);
  }
}

function getCatAWeight(pressureAltitude, tempCelsius) {
  const altitudes = Object.keys(catATableD).map(Number).sort((a,b)=>a-b);
  const alt = Math.max(altitudes[0], Math.min(altitudes[altitudes.length-1], pressureAltitude));
  let altLower=altitudes[0], altUpper=altitudes[altitudes.length-1];
  for(let i=0;i<altitudes.length-1;i++){
    if(alt>=altitudes[i]&&alt<=altitudes[i+1]){altLower=altitudes[i];altUpper=altitudes[i+1];break;}
  }
  const tempsL=Object.keys(catATableD[altLower]).map(Number).sort((a,b)=>a-b).filter(t=>catATableD[altLower][t]!==null);
  const tempsU=Object.keys(catATableD[altUpper]).map(Number).sort((a,b)=>a-b).filter(t=>catATableD[altUpper][t]!==null);
  if(!tempsL.length||!tempsU.length) return null;
  if(tempCelsius>tempsL[tempsL.length-1]||tempCelsius>tempsU[tempsU.length-1]) return null;
  const temp=Math.max(tempsL[0],tempCelsius);
  let tL=tempsL[0],tU=tempsL[tempsL.length-1];
  for(let i=0;i<tempsL.length-1;i++){if(temp>=tempsL[i]&&temp<=tempsL[i+1]){tL=tempsL[i];tU=tempsL[i+1];break;}}
  const w1=catATableD[altLower][tL],w2=catATableD[altLower][tU];
  const w3=catATableD[altUpper][tL],w4=catATableD[altUpper][tU];
  if(w1===null||w2===null||w3===null||w4===null) return null;
  if(altUpper===altLower&&tU===tL) return w1;
  if(altUpper===altLower) return w1+(temp-tL)/(tU-tL)*(w2-w1);
  if(tU===tL) return w1+(alt-altLower)/(altUpper-altLower)*(w3-w1);
  const tAlt=(alt-altLower)/(altUpper-altLower),tTemp=(temp-tL)/(tU-tL);
  return (w1+tTemp*(w2-w1))+tAlt*((w3+tTemp*(w4-w3))-(w1+tTemp*(w2-w1)));
}

const DB_NAME='fxv_wb',DB_VER=1,STORE='queue';

function openDB(){

function isDST(d){
  const jan=new Date(d.getFullYear(),0,1).getTimezoneOffset();
  const jul=new Date(d.getFullYear(),6,1).getTimezoneOffset();
  return d.getTimezoneOffset()<Math.max(jan,jul);
}
function getETDateStr(){
  const now=new Date();
  const off=isDST(now)?-4:-5;
  const et=new Date(now.getTime()+off*3600000);
  return et.toISOString().slice(0,10);
}
function pastResetToday(){
  const now=new Date();
  const off=isDST(now)?-4:-5;
  const et=new Date(now.getTime()+off*3600000);
  const h=et.getUTCHours();
  return h>=3;
}
async function saveQueueToDB(){
  try{
    const db=await openDB();
    const tx=db.transaction(STORE,'readwrite');
    const st=tx.objectStore(STORE);
    st.clear();
    for(const item of pdfQueue){
      const ab=await item.blob.arrayBuffer();
      st.put({seq:item.seq,tripLabel:item.tripLabel,filename:item.filename,
              blob:ab,savedDate:getETDateStr()});
    }

  }catch(e){console.warn('Queue save failed:',e);}
}
async function loadQueueFromDB(){
  try{
    const db=await openDB();
    const tx=db.transaction(STORE,'readonly');
    const all=await new Promise((res,rej)=>{
      const req=tx.objectStore(STORE).getAll();
      req.onsuccess=e=>res(e.target.result);
      req.onerror=e=>rej(e.target.error);
    });
    if(!all||all.length===0)return;
    const todayET=getETDateStr();
    const sentinel=all.find(r=>r.seq===-1);
    const savedDate=sentinel?sentinel.savedDate:'';
    if(savedDate&&savedDate<todayET&&pastResetToday()){
      await clearDB();
      console.log('FXV queue: 3am ET reset');
      return;

    sf(16,isT||isZ,'#000');row.forEach((cell,i)=>ctx.fillText(String(cell),cx[i]+2,y+24));
    hl(y+RH);y+=RH;
  });
  y+=24;
  const ok=!cv.weightExceeded&&cv.cgInLimits;
  bx(L,y,CW,40,ok?'#c8e6c9':'#ffcdd2');
  sf(18,true,ok?'#2e7d32':'#c62828');
  ctx.fillText('CG: '+cv.cg.toFixed(2)+' in  —  '+cgStatusStr+'  (Limits: '+cv.cgLimits.min+' – '+cv.cgLimits.max+')',L+8,y+26);
  y+=52;
  // Summary box: total pax + zero fuel W&B
  bx(L,y,CW,44,'#e8eaf6');
  sf(16,true,'#1a237e');ctx.fillText('TOTAL PAX ON BOARD: '+(state.numPassFwd+state.numPassAft),L+8,y+28);
  ctx.fillText('ZERO FUEL: '+cv.zeroFuelWeight.toFixed(0)+' lbs  |  ZF CG: '+cv.zeroFuelCG.toFixed(2)+' in  |  ZF Moment: '+(cv.zeroFuelWeight*cv.zeroFuelCG).toFixed(0),L+440,y+28);
  y+=44;
  bx(L,y,CW,44,'#f3f4ff');
  sf(16,false,'#444');
  const zfOK=!cv.weightExceeded&&cv.cgInLimits;
  ctx.fillText('Fuel: '+state.fuel+' lbs  |  Fuel Arm: '+cv.fuelArm.toFixed(2)+' in  |  Full fuel CG: '+cv.cg.toFixed(2)+' in  |  Status: '+(zfOK?'WITHIN LIMITS':'OUT OF LIMITS'),L+8,y+28);
  y+=60;
  sf(18,true,'#333');ctx.fillText('Center of Gravity Envelope',L,y+18);y+=24;
  const gc=document.getElementById('cgGraph');
  if(gc){const sw=gc.width,sh=gc.height;gc.width=1120;gc.height=GH;drawGraph(cv);ctx.drawImage(gc,L,y,CW,GH);gc.width=sw;gc.height=sh;drawGraph(cv);}
  y+=GH+10;
  const tr=document.createElement('canvas');tr.width=W;tr.height=y;tr.getContext('2d').drawImage(can,0,0);return tr;
}
function canvasToPDF(canvas){
  const id=canvas.toDataURL('image/jpeg',0.92).split(',')[1];
  const ib=atob(id);
  const pW=612,pH=792,mg=18,mxW=pW-mg*2,mxH=pH-mg*2;
  const sc=Math.min(mxW/canvas.width,mxH/canvas.height,1);
  const iW=Math.round(canvas.width*sc),iH=Math.round(canvas.height*sc);
  const iX=mg,iY=pH-mg-iH;
  const st='q\n'+iW+' 0 0 '+iH+' '+iX+' '+iY+' cm\n/Img Do\nQ';
  const enc=new TextEncoder();const parts=[];let bc=0;
  function ap(s){const b=enc.encode(s);parts.push(b);bc+=b.length;}
  function ab(b){parts.push(b);bc+=b.length;}
  ap('%PDF-1.4\n');
  const xr=[];
  [
    '<<\n/Type /Catalog\n/Pages 2 0 R\n>>',
    '<<\n/Type /Pages\n/Kids [3 0 R]\n/Count 1\n>>',
    '<<\n/Type /Page\n/Parent 2 0 R\n/MediaBox [0 0 '+pW+' '+pH+']\n/Contents 4 0 R\n/Resources <<\n/XObject << /Img 5 0 R >>\n>>\n>>',
    '<<\n/Length '+st.length+'\n>>\nstream\n'+st+'\nendstream',
  ].forEach((o,i)=>{xr.push(bc);ap((i+1)+' 0 obj\n'+o+'\nendobj\n');});
  xr.push(bc);
  ap('5 0 obj\n<<\n/Type /XObject\n/Subtype /Image\n/Width '+canvas.width+'\n/Height '+canvas.height+'\n/ColorSpace /DeviceRGB\n/BitsPerComponent 8\n/Filter /DCTDecode\n/Length '+ib.length+'\n>>\nstream\n');
  const ba=new Uint8Array(ib.length);for(let i=0;i<ib.length;i++)ba[i]=ib.charCodeAt(i);
  ab(ba);ap('\nendstream\nendobj\n');
  const xo=bc;
  let xs='xref\n0 6\n0000000000 65535 f \n';
  xr.forEach(o=>{xs+=String(o).padStart(10,'0')+' 00000 n \n';});
  xs+='trailer\n<<\n/Size 6\n/Root 1 0 R\n>>\nstartxref\n'+xo+'\n%%EOF';ap(xs);
  let tl=0;parts.forEach(p=>tl+=p.length);
  const out=new Uint8Array(tl);let pos=0;parts.forEach(p=>{out.set(p,pos);pos+=p.length;});
  return new Blob([out],{type:'application/pdf'});
}
async function exportPDF(){
  if(pdfGenerating)return;
  pdfGenerating=true;updateExportBtn();
  try{
    await new Promise(r=>setTimeout(r,50));
    const canvas=drawWBToCanvas();
    const blob=canvasToPDF(canvas);
    const repItem=replacingSeq!==null?pdfQueue.find(i=>i.seq===replacingSeq):null;
    const tripLabel=repItem?repItem.tripLabel:getTripLabel();
    const seq=repItem?repItem.seq:currentSeq;
    const tail=(helicopters[state.selectedHeliIndex]||{}).tailNumber||'FXV';
    const safeLbl=tripLabel.replace(/[^a-zA-Z0-9]/g,'_');
    const dateStr=state.date||new Date().toISOString().split('T')[0];
    const fn=safeLbl+'_FXV_WB_'+tail+'_'+dateStr+'.pdf';
    const idx=pdfQueue.findIndex(i=>i.seq===seq);
    const wasReplace=replacingSeq!==null;
    if(idx>=0){pdfQueue[idx]={seq,tripLabel,blob,filename:fn};showToast(tripLabel+' replaced ✓');}
    else{pdfQueue.push({seq:currentSeq,tripLabel,blob,filename:fn});showToast(tripLabel+' added ✓');currentSeq++;}
    replacingSeq=null;renderQueuePanel();updateSendBtn();saveQueueToDB();
    // Auto-advance: destination→departure, clear pax/baggage, keep crew & fuel
    if(!wasReplace){
      state.from=state.to||'';
      state.to='';
      state.numPassFwd=0;
      state.passFwdWeight=0;
      state.numPassAft=0;
      state.passAftWeight=0;
      state.baggage=0;
      state.picWeightOverride=null;
      state.sicWeightOverride=null;
      render();
    }
  }catch(err){alert('PDF error: '+(err&&err.message?err.message:String(err)));console.error(err);}
  pdfGenerating=false;updateExportBtn();
}
async function sendToOps(){
  if(pdfQueue.length===0)return;
  try{
    const files=pdfQueue.sort((a,b)=>a.seq-b.seq).map(i=>new File([i.blob],i.filename,{type:'application/pdf'}));
    const isTouchDevice=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
    if(isTouchDevice&&navigator.share&&navigator.canShare&&navigator.canShare({files})){
      await navigator.share({files,title:'FXV Weight & Balance',text:'W&B — '+files.length+' leg(s)'});
    }else{
      files.forEach(f=>{const u=URL.createObjectURL(f);const a=document.createElement('a');a.href=u;a.download=f.name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000);});
    }
  }catch(err){if(err.name!=='AbortError')showToast('Share failed — try again');}
}



function fuelToMaxGross(c) {
  const zeroFuelWeight = c.totalWeight - state.fuel;
  const maxFuelPounds = c.maxGrossWeight - zeroFuelWeight;
  const maxFuelGallons = maxFuelPounds / 6.8;
  const fuelCapacity = c.heli.model.includes('S-76D') ? 286.0 : 281.2;
  const finalFuel = Math.min(Math.max(0, maxFuelPounds), fuelCapacity * 6.8);
  state.fuel = Math.round(finalFuel);
  render();
}

function fuelToHOGE(p, c) {
  if (!p.hogeWeight || p.hogeWeight === null) return;
  const zeroFuelWeight = c.totalWeight - state.fuel;
  const maxFuelPounds = p.hogeWeight - zeroFuelWeight;
  const fuelCapacity = c.heli.model.includes('S-76D') ? 286.0 : 281.2;
  const finalFuel = Math.min(Math.max(0, maxFuelPounds), fuelCapacity * 6.8);
  state.fuel = Math.round(finalFuel);
  render();
}

function fuelToMEA(p, c) {
  if (!p.meaWeight || p.meaWeight === null) return;
  const zeroFuelWeight = c.totalWeight - state.fuel;
  const maxFuelPounds = p.meaWeight - zeroFuelWeight;
  const fuelCapacity = c.heli.model.includes('S-76D') ? 286.0 : 281.2;
  const finalFuel = Math.min(Math.max(0, maxFuelPounds), fuelCapacity * 6.8);
  state.fuel = Math.round(finalFuel);
  render();
}

function drawGraph(c){const canvas=document.getElementById('cgGraph');if(!canvas)return;const ctx=canvas.getContext('2d');const w=canvas.width;const h=canvas.height;ctx.fillStyle='white';ctx.fillRect(0,0,w,h);const pad=60;const padL=70;const gw=w-padL-pad;const gh=h-2*pad;function getEnv(m,lat){if(m.includes('S-76D')){

else if(absLat<=2.5)return[[208.3,7350],[196.5,8918],[196.5,9500],[199.5,11000],[202.2,11875],[204.5,11875],[210.0,9500],[210.0,9250],[208.3,7350]];
else if(absLat<=3.5)return[[208.3,7350],[199.0,8586],[199.0,9500],[202.0,11000],[203.3,11400],[205.6,11400],[210.0,9500],[210.0,9250],[208.3,7350]];
else if(absLat<=4.5)return[[208.3,7350],[194.0,9250],[194.0,9500],[196.6,10800],[207.0,10800],[210.0,9500],[210.0,9250],[208.3,7350]];
else return[[208.3,7350],[194.0,9250],[194.0,9500],[196.6,10800],[207.0,10800],[210.0,9500],[210.0,9250],[208.3,7350]];
}else return[[208.2,7350],[199.2,7500],[194.0,8500],[194.0,9500],[197.0,11000],[199.2,11700],[204.0,11700],[210.0,9250],[208.2,7350]]}const env=getEnv(c.heli.model,c.lateralCG||0);const minCG=193;const maxCG=211;const minW=7000;const maxW=12000;function xPos(cg){return padL+((cg-minCG)/(maxCG-minCG))*gw}function yPos(wt){return h-pad-((wt-minW)/(maxW-minW))*gh}ctx.strokeStyle='#e0e0e0';ctx.lineWidth=1;for(let cg=minCG;cg<=maxCG;cg+=2){ctx.beginPath();ctx.moveTo(xPos(cg),pad);ctx.lineTo(xPos(cg),h-pad);ctx.stroke()}for(let wt=minW;wt<=maxW;wt+=1000){ctx.beginPath();ctx.moveTo(padL,yPos(wt));ctx.lineTo(w-pad,yPos(wt));ctx.stroke()}ctx.fillStyle='rgba(76,175,80,0.15)';ctx.strokeStyle='#2E7D32';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(xPos(env[0][0]),yPos(env[0][1]));for(let i=1;i<env.length;i++)ctx.lineTo(xPos(env[i][0]),yPos(env[i][1]));ctx.closePath();ctx.fill();ctx.stroke();ctx.strokeStyle='#2196F3';ctx.lineWidth=3;ctx.setLineDash([8,4]);ctx.beginPath();ctx.moveTo(xPos(c.cg),yPos(c.totalWeight));ctx.lineTo(xPos(c.zeroFuelCG),yPos(c.zeroFuelWeight));ctx.stroke();ctx.setLineDash([]);function inEnv(cg,wt){const minWE=Math.min(...env.map(p=>p[1]));const maxWE=Math.max(...env.map(p=>p[1]));if(wt<minWE||wt>maxWE)return false;let inside=false;for(let i=0,j=env.length-1;i<env.length;j=i++){const xi=env[i][0],yi=env[i][1];const xj=env[j][0],yj=env[j][1];const intersect=((yi>wt)!==(yj>wt))&&(cg<(xj-xi)*(wt-yi)/(yj-yi)+xi);if(intersect)inside=!inside}return inside}const fullOK=inEnv(c.cg,c.totalWeight);const zeroOK=inEnv(c.zeroFuelCG,c.zeroFuelWeight);ctx.fillStyle=fullOK?'#2196F3':'#f44336';ctx.beginPath();ctx.arc(xPos(c.cg),yPos(c.totalWeight),7,0,2*Math.PI);ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle=zeroOK?'#2196F3':'#f44336';ctx.beginPath();ctx.arc(xPos(c.zeroFuelCG),yPos(c.zeroFuelWeight),7,0,2*Math.PI);ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#333';ctx.font='bold 11px Arial';ctx.textAlign='center';const fullX=xPos(c.cg);const fullY=yPos(c.totalWeight);const fullLY=fullY<h/2?fullY+20:fullY-20;ctx.fillText('Full Fuel',fullX,fullLY);ctx.font='10px Arial';ctx.fillText(`${c.totalWeight.toFixed(0)} lbs, ${c.cg.toFixed(2)}"`,fullX,fullLY+12);ctx.font='bold 11px Arial';const zeroX=xPos(c.zeroFuelCG);const zeroY=yPos(c.zeroFuelWeight);const zeroLY=zeroY<h/2?zeroY+20:zeroY-20;ctx.fillText('Zero Fuel',zeroX,zeroLY);ctx.font='10px Arial';ctx.fillText(`${c.zeroFuelWeight.toFixed(0)} lbs, ${c.zeroFuelCG.toFixed(2)}"`,zeroX,zeroLY+12);ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(padL,h-pad);ctx.lineTo(w-pad,h-pad);ctx.stroke();ctx.beginPath();ctx.moveTo(padL,pad);ctx.lineTo(padL,h-pad);ctx.stroke();ctx.fillStyle='#333';ctx.font='11px Arial';ctx.textAlign='center';for(let cg=minCG;cg<=maxCG;cg+=2)ctx.fillText(cg.toString(),xPos(cg),h-pad+20);ctx.font='bold 12px Arial';ctx.fillText('CENTER OF GRAVITY - INCHES AFT OF DATUM',w/2,h-10);ctx.textAlign='right';ctx.font='11px Arial';for(let wt=minW;wt<=maxW;wt+=1000)ctx.fillText((wt/1000).toString(),padL-10,yPos(wt)+4);ctx.save();ctx.translate(15,h/2);ctx.rotate(-Math.PI/2);ctx.font='bold 12px Arial';ctx.textAlign='center';ctx.fillText('GROSS WEIGHT - 1000 LB',0,0);ctx.restore();const lx=w-220;const ly=30;ctx.fillStyle='rgba(76,175,80,0.3)';ctx.fillRect(lx,ly,20,15);ctx.strokeStyle='#2E7D32';ctx.lineWidth=2;ctx.strokeRect(lx,ly,20,15);ctx.fillStyle='#333';ctx.font='12px Arial';ctx.textAlign='left';let mt='S-76C+';if(c.heli.model.includes('S-76D'))mt='S-76D';else if(c.heli.model.includes('C++'))mt='S-76C++';ctx.fillText(`CG Envelope (${mt})`,lx+25,ly+11);ctx.strokeStyle='#2196F3';ctx.lineWidth=3;ctx.setLineDash([8,4]);ctx.beginPath();ctx.moveTo(lx,ly+30);ctx.lineTo(lx+20,ly+30);ctx.stroke();ctx.setLineDash([]);ctx.fillText('Fuel Burn',lx+25,ly+33);ctx.font='bold 12px Arial';if(fullOK&&zeroOK){ctx.fillStyle='#2E7D32';ctx.fillText('✓ WITHIN LIMITS',lx,ly+55)}else{ctx.fillStyle='#c62828';ctx.fillText('✗ OUT OF LIMITS',lx,ly+55)}}
